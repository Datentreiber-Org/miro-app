<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Datentreiber 3-Boxes – Miro Panel</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 8px;
      color: #111827;
    }
    h1 { font-size: 16px; margin: 0 0 8px 0; }
    label { font-weight: 500; }
    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 4px 6px;
      margin-top: 2px;
      margin-bottom: 6px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      font-family: inherit;
    }
    textarea { min-height: 60px; resize: vertical; }
    button {
      font-size: 12px;
      padding: 4px 8px;
      margin: 2px 4px 4px 0;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: #f3f4f6;
      cursor: pointer;
    }
    button:hover { background: #e5e7eb; }
    #log {
      margin-top: 8px;
      height: 260px;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      padding: 6px;
      background: #f9fafb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      overflow: auto;
    }
    .row { margin-bottom: 6px; }
    .btn-row { margin-top: 4px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Datentreiber 3-Boxes – Panel</h1>

  <div class="row">
    <label for="api-key">OpenAI API Key</label>
    <input type="password" id="api-key" placeholder="sk-..." />
  </div>

  <div class="row">
    <label for="model">Modell</label>
    <select id="model">
      <option value="gpt-4.1-mini">gpt-4.1-mini</option>
      <option value="gpt-4.1">gpt-4.1</option>
      <option value="gpt-4o-mini">gpt-4o-mini</option>
      <option value="gpt-4o">gpt-4o</option>
    </select>
  </div>

  <div class="row">
    <label for="user-text">Frage / Aufgabe für den Agenten (Modus B)</label>
    <textarea id="user-text" placeholder="Was soll der Agent mit der ausgewählten Canvas-Instanz tun?"></textarea>
  </div>

  <div class="btn-row">
    <button id="btn-insert-template">Template-Bild einfügen</button>
  </div>

  <div class="btn-row">
    <button id="btn-cluster-panel">Auswahl clustern (Side-Panel)</button>
    <button id="btn-classify-debug">Stickies klassifizieren (Debug)</button>
    <button id="btn-openai-classic">Klassischer OpenAI-Call</button>
  </div>

  <pre id="log"></pre>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
