<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Datentreiber Canvas – Miro Panel</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 8px;
      color: #111827;
    }
    h1 { font-size: 16px; margin: 0 0 8px 0; }
    label { font-weight: 500; }
    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 4px 6px;
      margin-top: 2px;
      margin-bottom: 6px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      font-family: inherit;
    }
    textarea { min-height: 60px; resize: vertical; }
    button {
      font-size: 12px;
      padding: 4px 8px;
      margin: 2px 4px 4px 0;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: #f3f4f6;
      cursor: pointer;
    }
    button:hover { background: #e5e7eb; }
    #log {
      margin-top: 8px;
      height: 260px;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      padding: 6px;
      background: #f9fafb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      overflow: auto;
    }
    .row { margin-bottom: 6px; }
    .btn-row { margin-top: 4px; margin-bottom: 6px; }
    .canvas-picker {
      display: grid;
      gap: 8px;
      max-height: 180px;
      overflow: auto;
    }
    .canvas-option {
      display: block;
      cursor: pointer;
    }
    .canvas-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .canvas-option-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #ffffff;
    }
    .canvas-option input:checked + .canvas-option-card {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px #2563eb;
    }
    .canvas-thumb {
      width: 84px;
      height: 56px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
    }
    .canvas-option-title {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .canvas-option-meta {
      font-size: 11px;
      color: #4b5563;
      line-height: 1.35;
    }
    #selection-status {
      margin-top: 6px;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Datentreiber Canvas – Panel</h1>

  <div class="row">
    <label for="api-key">OpenAI API Key</label>
    <input type="password" id="api-key" placeholder="sk-..." />
  </div>

  <div class="row">
    <label for="model">Modell</label>
    <select id="model">
      <option value="gpt-4.1-mini">gpt-4.1-mini</option>
      <option value="gpt-4.1">gpt-4.1</option>
      <option value="gpt-4o-mini">gpt-4o-mini</option>
      <option value="gpt-4o">gpt-4o</option>
    </select>
  </div>

  <div class="row">
    <label for="user-text">Frage / Aufgabe für den Agenten</label>
    <textarea id="user-text" placeholder="Was soll der Agent mit den selektierten Canvas-Instanzen oder im globalen Lauf tun?"></textarea>
  </div>

  <div class="row">
    <label for="canvas-type-picker">Canvas-Typ auswählen</label>
    <div id="canvas-type-picker" class="canvas-picker">Canvas-Typen werden geladen ...</div>
  </div>

  <div class="btn-row">
    <button id="btn-insert-template">Canvas einfügen</button>
  </div>

  <div id="selection-status">Selektion wird geladen ...</div>

  <div class="btn-row">
    <button id="btn-agent-selection">Instanz-Agent (Selektion)</button>
    <button id="btn-global-agent">Global Agent</button>
  </div>

  <div class="btn-row">
    <button id="btn-cluster-panel">Auswahl clustern (Side-Panel)</button>
    <button id="btn-classify-debug">Stickies klassifizieren (Debug)</button>
    <button id="btn-openai-classic">Klassischer OpenAI-Call</button>
  </div>

  <pre id="log"></pre>

  <script type="module" src="./src/main.js?v=20260228-step4"></script>
</body>
</html>
