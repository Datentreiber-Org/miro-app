<!doctype html>
<meta charset="utf-8">
<title>Datentreiber Canvas – Loader</title> 
<script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
<script type="module">
  const APP_ASSET_VERSION = "20260316-patch19-analytics-ai-maturity-pack";

  function buildPanelUrl() {
    const url = new URL("./app.html", window.location.href);
    url.searchParams.set("panel", "1");
    url.searchParams.set("v", APP_ASSET_VERSION);
    return url.toString();
  }

  function openPanelFresh() {
    return miro.board.ui.openPanel({ url: buildPanelUrl() });
  }

  // Wichtig: Der App-Icon-Klick muss im Loader registriert bleiben.
  miro.board.ui.on("icon:click", openPanelFresh);

  // Headless-Runtime parallel booten.
  window.__DT_RUNTIME_CONTEXT = "headless";
  import("./src/headless/runtime.js?v=20260316-patch19-analytics-ai-maturity-pack").catch((error) => {
    console.error("[DT][loader] Headless-Boot fehlgeschlagen", error);
  });
</script>
